<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <title></title>
</head>
<body>

<section class="concat-page">
    <div class="container">
        <a href="./index.html" class="arrow-href">
            <i class="icon-arrow-prev"></i>
            <span>назад</span>
        </a>
        <div class="concat-flex">
            <div class="concat-info">
                <h3>свяжитесь с нами</h3>
                <h5>Шудашова Яна</h5>
                <h5>Алла Разуваева</h5>
                <h5>Вильям Хайло</h5>
                <a href="mailto:M.O.C.T@yandex.ru">M.O.C.T@yandex.ru</a>
            </div>
            <div class="concat-form" >
                <form id="contactForm" action="send.php" method="POST" novalidate>
                    <div class="concat-form-col">
                        <div class="concat-input">
                            <small>Имя</small>
                            <label>
                                <input type="text" name="name" id="name" required>
                            </label>
                            <div class="error" id="nameError" ></div>
                        </div>

                        <div class="concat-input">
                            <small>Email</small>
                            <label>
                                <input type="email" name="email" id="email" required>
                            </label>
                            <div class="error" id="emailError" ></div>
                        </div>

                        <div class="concat-input">
                            <small>Что вам интересно?</small>
                            <label>
                                <input type="text" name="subject" id="subject">
                            </label>
                        </div>

                        <div class="concat-input">
                            <small>Сообщение</small>
                            <label>
                                <textarea name="message" id="message" required></textarea>
                            </label>
                        </div>

                        <button class="btn-send" type="submit">Отправить</button>
                        <div id="formResult"></div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</section>




<script src="./assets/js/jquery-3.6.4.js"></script>
<script src="./assets/js/script.js"></script>
<script>
    const form = document.querySelector('form');
    const nameInput = document.querySelector('input[name="name"]');
    const emailInput = document.querySelector('input[name="email"]');

    function setError(input) {
        input.classList.add('input-error');
        input.classList.remove('input-ok');
    }

    function setOk(input) {
        input.classList.remove('input-error');
        input.classList.add('input-ok');
    }

    function validateName(value) {
        // минимум 2 символа, только буквы/пробелы/дефис
        return /^[\p{L}\s'-]{2,60}$/u.test(value.trim());
    }

    function validateEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
    }

    // Убираем проверку на blur — валидация только при submit

    // При вводе: если стало валидно — убираем ошибку (не ставим ошибку при вводе)
    nameInput.addEventListener('input', () => {
        if (validateName(nameInput.value)) {
            setOk(nameInput);
        } else {
            // не подсвечиваем красным при вводе; только удаляем "ok", если поле снова невалидно
            nameInput.classList.remove('input-ok');
        }
    });

    emailInput.addEventListener('input', () => {
        if (validateEmail(emailInput.value)) {
            setOk(emailInput);
        } else {
            emailInput.classList.remove('input-ok');
        }
    });

    // Валидация только при отправке формы
    form.addEventListener('submit', (e) => {
        let valid = true;

        if (!validateName(nameInput.value)) {
            setError(nameInput);
            valid = false;
        } else {
            setOk(nameInput);
        }

        if (!validateEmail(emailInput.value)) {
            setError(emailInput);
            valid = false;
        } else {
            setOk(emailInput);
        }

        if (!valid) {
            e.preventDefault();
            // Можно дополнительно сфокусировать первое неверное поле:
            const firstError = form.querySelector('.input-error');
            if (firstError) firstError.focus();
        }
    });

</script>

</body>
</html>
